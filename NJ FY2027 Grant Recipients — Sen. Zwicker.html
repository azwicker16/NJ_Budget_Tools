<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NJ FY2027 Grant Recipients — Sen. Zwicker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
:root {
  --bg:#0c0f14; --bg2:#131720; --bg3:#1b2130; --border:#222c3c;
  --gold:#c9a84c; --gold2:#8a6e2e; --text:#dce6f0; --dim:#5a6880;
  --green:#3dba74; --red:#e05a5a; --blue:#4a9fd4;
  --zwicker-green:#4a8c5c; --zwicker-navy:#2d4a6b;
  --green-bg:rgba(61,186,116,0.10); --red-bg:rgba(224,90,90,0.10);
  --zero-bg:rgba(90,104,128,0.10); --new-bg:rgba(74,159,212,0.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;}

.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 28px;display:flex;align-items:center;gap:20px;position:sticky;top:0;z-index:100;flex-wrap:wrap;}

.brand{display:flex;align-items:center;gap:12px;border-right:1px solid var(--border);padding-right:20px;margin-right:4px;}
.brand img{height:36px;width:auto;opacity:0.92;}
.brand-label{font-family:'IBM Plex Mono',monospace;font-size:0.62rem;color:var(--dim);letter-spacing:0.12em;text-transform:uppercase;line-height:1.5;white-space:nowrap;}
.brand-label strong{display:block;color:var(--text);font-size:0.68rem;letter-spacing:0.08em;}

.search-wrap{flex:1;position:relative;min-width:200px;max-width:460px;}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--dim);pointer-events:none;}
#searchBox{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:9px 12px 9px 38px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:0.83rem;outline:none;transition:border-color 0.15s;}
#searchBox:focus{border-color:var(--zwicker-green);}
#searchBox::placeholder{color:var(--dim);}
.pills{display:flex;gap:6px;flex-wrap:wrap;}
.pill{background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:4px 10px;font-size:0.66rem;font-family:'IBM Plex Mono',monospace;letter-spacing:0.06em;color:var(--dim);cursor:pointer;transition:all 0.12s;white-space:nowrap;}
.pill:hover{border-color:var(--zwicker-green);color:#6ab882;}
.pill.active{background:rgba(74,140,92,0.12);border-color:var(--zwicker-green);color:#6ab882;}

.statsbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 28px;display:flex;gap:28px;align-items:center;flex-wrap:wrap;}
.stat{display:flex;align-items:baseline;gap:7px;}
.stat-num{font-family:'IBM Plex Mono',monospace;font-size:1.05rem;font-weight:600;}
.stat-label{font-size:0.68rem;color:var(--dim);letter-spacing:0.08em;}
.stat-num.red{color:var(--red);} .stat-num.green{color:var(--green);}
.stat-num.orange{color:#e08040;} .stat-num.blue{color:var(--blue);}
.stat-num.muted{color:var(--dim);}

.sortbar{padding:9px 28px;display:flex;gap:7px;align-items:center;border-bottom:1px solid var(--border);}
.sort-label{font-size:0.68rem;color:var(--dim);font-family:'IBM Plex Mono',monospace;margin-right:4px;}
.sort-btn{background:none;border:1px solid var(--border);border-radius:3px;color:var(--dim);font-family:'IBM Plex Mono',monospace;font-size:0.68rem;padding:4px 10px;cursor:pointer;transition:all 0.12s;}
.sort-btn:hover{color:var(--text);border-color:var(--dim);}
.sort-btn.active{color:#6ab882;border-color:var(--zwicker-green);}
.result-count{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:0.7rem;color:var(--dim);}

.grid{padding:18px 28px;display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:9px;}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:13px 15px;border-left:3px solid transparent;transition:background 0.12s;}
.card:hover{background:var(--bg3);}
.card.zeroed{border-left-color:var(--red);}
.card.up{border-left-color:var(--green);}
.card.down{border-left-color:#b06820;}
.card.same{border-left-color:var(--border);}
.card.isnew{border-left-color:var(--blue);}

.card-name{font-size:0.84rem;font-weight:500;color:var(--text);margin-bottom:8px;line-height:1.35;}
.card-meta{display:flex;align-items:center;gap:7px;margin-bottom:10px;flex-wrap:wrap;}
.dept-tag{font-family:'IBM Plex Mono',monospace;font-size:0.6rem;letter-spacing:0.08em;padding:2px 6px;border-radius:3px;background:var(--bg3);border:1px solid var(--border);color:var(--dim);}
.status-tag{font-family:'IBM Plex Mono',monospace;font-size:0.6rem;letter-spacing:0.08em;padding:2px 6px;border-radius:3px;}
.status-tag.zeroed{background:var(--red-bg);color:var(--red);border:1px solid rgba(224,90,90,0.25);}
.status-tag.up{background:var(--green-bg);color:var(--green);border:1px solid rgba(61,186,116,0.25);}
.status-tag.down{background:rgba(176,104,32,0.12);color:#e08040;border:1px solid rgba(176,104,32,0.3);}
.status-tag.same{background:var(--zero-bg);color:var(--dim);border:1px solid rgba(90,104,128,0.25);}
.status-tag.isnew{background:var(--new-bg);color:var(--blue);border:1px solid rgba(74,159,212,0.25);}

.card-nums{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;}
.num-cell{text-align:center;}
.num-cell .label{font-family:'IBM Plex Mono',monospace;font-size:0.57rem;color:var(--dim);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:2px;}
.num-cell .val{font-family:'IBM Plex Mono',monospace;font-size:0.8rem;font-weight:500;}
.val.red{color:var(--red);} .val.green{color:var(--green);}
.val.orange{color:#e08040;} .val.muted{color:var(--dim);} .val.blue{color:var(--blue);}

.empty{grid-column:1/-1;padding:80px;text-align:center;color:var(--dim);font-family:'IBM Plex Mono',monospace;font-size:0.85rem;letter-spacing:0.1em;}
mark{background:rgba(74,140,92,0.25);color:#6ab882;border-radius:2px;padding:0 1px;}

.footer{padding:20px 28px;border-top:1px solid var(--border);display:flex;align-items:center;gap:12px;}
.footer img{height:22px;opacity:0.4;}
.footer-text{font-family:'IBM Plex Mono',monospace;font-size:0.65rem;color:var(--dim);letter-spacing:0.08em;}
</style>
</head>

let query = "", deptFilter = "all", sortMode = "change-pct";
const ALL_DEPTS = [...new Set(RAW.map(r => r.dept))].sort();

function fmtK(n) {
  if (n === 0) return "$0";
  const a = Math.abs(n), s = n < 0 ? "–" : "";
  if (a >= 1000000) return s + "$" + (a/1000000).toFixed(2) + "B";
  if (a >= 1000) return s + "$" + (a/1000).toFixed(1) + "M";
  return s + "$" + a.toLocaleString() + "K";
}

function fmtPct(p, st) {
  if (st === "isnew") return "NEW";
  if (p === null || p === undefined) return "—";
  return (p >= 0 ? "+" : "") + p.toFixed(1) + "%";
}

function statusOf(r) {
  if (r.fy26 === 0 && r.fy27 > 0) return "isnew";
  if (r.fy27 === 0 && r.fy26 > 0) return "zeroed";
  if (r.change > 0) return "up";
  if (r.change < 0) return "down";
  return "same";
}

const statusLabels = { zeroed:"ELIMINATED", up:"INCREASED", down:"REDUCED", same:"UNCHANGED", isnew:"NEW" };

function highlight(text, q) {
  if (!q) return text;
  const esc = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp('(' + esc + ')', 'gi'), '<mark>$1</mark>');
}

function getFiltered() {
  let d = RAW;
  if (deptFilter !== "all") d = d.filter(r => r.dept === deptFilter);
  if (query) {
    const q = query.toLowerCase();
    d = d.filter(r => r.name.toLowerCase().includes(q) || r.dept.toLowerCase().includes(q));
  }
  return d;
}

function getSorted(d) {
  return [...d].sort((a, b) => {
    if (sortMode === "change-pct") {
      const sa = statusOf(a), sb = statusOf(b);
      if (sa === "zeroed" && sb !== "zeroed") return -1;
      if (sb === "zeroed" && sa !== "zeroed") return 1;
      const pa = a.pct ?? (a.fy27 > 0 ? 999 : 0);
      const pb = b.pct ?? (b.fy27 > 0 ? 999 : 0);
      return pa - pb;
    }
    if (sortMode === "change-abs") return a.change - b.change;
    if (sortMode === "fy26-desc") return b.fy26 - a.fy26;
    if (sortMode === "name") return a.name.localeCompare(b.name);
    return 0;
  });
}

function render() {
  const filtered = getFiltered();
  const sorted = getSorted(filtered);
  document.getElementById("s-zero").textContent = filtered.filter(r => statusOf(r) === "zeroed").length;
  document.getElementById("s-up").textContent   = filtered.filter(r => statusOf(r) === "up").length;
  document.getElementById("s-down").textContent = filtered.filter(r => statusOf(r) === "down").length;
  document.getElementById("s-new").textContent  = filtered.filter(r => statusOf(r) === "isnew").length;
  document.getElementById("s-same").textContent = filtered.filter(r => statusOf(r) === "same").length;
  document.getElementById("resultCount").textContent = sorted.length + " entries";

  const grid = document.getElementById("grid");
  if (sorted.length === 0) {
    grid.innerHTML = '<div class="empty">No matching grant recipients found.</div>';
    return;
  }

  grid.innerHTML = sorted.map(r => {
    const st = statusOf(r);
    const pctClass = st === "zeroed" || st === "down" ? "red" : st === "up" ? "green" : st === "isnew" ? "blue" : "muted";
    const fy27Display = r.fy27 === 0 ? '<span class="val red">ZERO</span>' : '<span class="val muted">' + fmtK(r.fy27) + '</span>';
    const fy26Display = r.fy26 === 0 ? '<span class="val muted">—</span>' : '<span class="val muted">' + fmtK(r.fy26) + '</span>';
    return '<div class="card ' + st + '">'
      + '<div class="card-name">' + highlight(r.name, query) + '</div>'
      + '<div class="card-meta">'
      + '<span class="dept-tag">' + r.dept + '</span>'
      + '<span class="status-tag ' + st + '">' + statusLabels[st] + '</span>'
      + '</div>'
      + '<div class="card-nums">'
      + '<div class="num-cell"><div class="label">FY26 Adj.</div>' + fy26Display + '</div>'
      + '<div class="num-cell"><div class="label">FY27 Rec.</div>' + fy27Display + '</div>'
      + '<div class="num-cell"><div class="label">% Change</div><span class="val ' + pctClass + '">' + fmtPct(r.pct, st) + '</span></div>'
      + '</div></div>';
  }).join('');
}

const pillsEl = document.getElementById("deptPills");
[{val:"all",label:"ALL"}, ...ALL_DEPTS.map(d => ({val:d, label:d.toUpperCase()}))].forEach(({val, label}) => {
  const b = document.createElement("button");
  b.className = "pill" + (val === "all" ? " active" : "");
  b.textContent = label;
  b.addEventListener("click", () => {
    deptFilter = val;
    document.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
    b.classList.add("active");
    render();
  });
  pillsEl.appendChild(b);
});

document.querySelectorAll(".sort-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    sortMode = btn.dataset.sort;
    document.querySelectorAll(".sort-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    render();
  });
});

document.getElementById("searchBox").addEventListener("input", e => {
  query = e.target.value.trim();
  render();
});

render();
document.getElementById("searchBox").focus();
</script>
